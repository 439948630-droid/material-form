<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商协作平台 · 内部管理</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f6fa;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#333;min-height:100vh}
/* 顶部导航 */
.top-nav{background:#fff;border-bottom:2px solid #e8ecff;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.top-nav-inner{max-width:1160px;margin:0 auto;display:flex;align-items:center;padding:0 14px}
.top-logo{font-size:16px;font-weight:800;color:#1a1a2e;padding:16px 20px 16px 0;border-right:1px solid #e8e8e8;margin-right:4px;white-space:nowrap}
.tab-btn{padding:17px 22px;font-size:14px;font-weight:600;color:#888;cursor:pointer;border-bottom:3px solid transparent;border-top:none;border-left:none;border-right:none;background:none;white-space:nowrap}
.tab-btn:hover{color:#4e7af0}
.tab-btn.active{color:#4e7af0;border-bottom-color:#4e7af0}
.tab-btn.active.inv{color:#e07b39;border-bottom-color:#e07b39}
/* 模块 */
.module{display:none;max-width:1160px;margin:0 auto;padding:28px 14px 70px}
.module.show{display:block}
/* 通用 */
.page-hd{background:#fff;border-radius:14px;padding:22px 28px;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-top:4px solid #38a169}
.page-hd.inv-hd{border-top-color:#e07b39}
.page-hd h1{font-size:20px;font-weight:700;color:#1a1a2e}
.page-hd .sub{font-size:12px;color:#bbb;margin-top:3px}
.stats{display:grid;gap:10px;margin-bottom:18px}
.stats-7{grid-template-columns:repeat(7,1fr)}
.stats-5{grid-template-columns:repeat(5,1fr)}
.sc{background:#fff;border-radius:12px;padding:14px 12px;box-shadow:0 1px 8px rgba(0,0,0,.07);text-align:center}
.sc .n{font-size:26px;font-weight:800}.sc .l{font-size:11px;color:#aaa;margin-top:4px}
.n-blue{color:#4e7af0}.n-orange{color:#e07b39}.n-green{color:#38a169}.n-gray{color:#888}.n-red{color:#e53e3e}
.toolbar{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:16px}
.toolbar-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar-row + .toolbar-row{margin-top:10px}
.toolbar label{font-size:12px;color:#aaa;margin-right:4px;white-space:nowrap}
.toolbar select,.toolbar input[type=date],.toolbar input[type=text]{height:36px;border:1.5px solid #e8e8e8;border-radius:8px;padding:0 10px;font-size:13px;color:#333;outline:none;background:#fafafa}
.toolbar select:focus,.toolbar input:focus{border-color:#4e7af0}
.toolbar input[type=date]{min-width:130px}
.toolbar .date-sep{font-size:13px;color:#bbb;padding:0 2px}
.btn-group{display:flex;gap:8px;margin-left:auto}
.btn{height:36px;padding:0 16px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-refresh{background:#f5f8ff;color:#4e7af0;border:1.5px solid #c0d0ff}
.btn-refresh:hover{background:#eef2ff}
.btn-export{background:#38a169;color:#fff}
.btn-export:hover{background:#2e8a5c}
.btn-export:disabled{opacity:.45;cursor:not-allowed}
.btn-clear{background:#fff;color:#e53e3e;border:1.5px solid #fac8c8}
.btn-clear:hover{background:#fff5f5}
.btn-reset{background:#fff;color:#888;border:1.5px solid #ddd;font-size:12px;padding:0 12px}
.btn-reset:hover{background:#f5f5f5}
.sel-bar{background:#eef3ff;border:1.5px solid #c0d0ff;border-radius:10px;padding:9px 16px;margin-bottom:12px;display:none;align-items:center;gap:14px;font-size:13px;color:#4e7af0}
.sel-bar.show{display:flex}
.sel-bar b{font-weight:700}
/* 物料申请卡片 */
.order-card{background:#fff;border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:12px;overflow:hidden}
.order-hd{padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#fafafa;border-bottom:1px solid #f0f0f0}
.oid{font-size:11px;color:#ccc;font-family:monospace}
.osup{font-size:14px;font-weight:700;color:#222;flex:1}
.otime{font-size:12px;color:#ccc}
.obuyer{font-size:12px;color:#888;background:#f0f0f0;padding:2px 8px;border-radius:12px;white-space:nowrap}
.days-badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:12px;white-space:nowrap}
.days-fresh{background:#f0faf4;color:#38a169;border:1px solid #b2dfdb}
.days-normal{background:#f5f8ff;color:#4e7af0;border:1px solid #c0d0ff}
.days-warn{background:#fff8e6;color:#d97706;border:1px solid #fcd34d}
.days-new{background:#f0f0f0;color:#aaa;border:1px solid #e0e0e0}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px}
.tag-reg{background:#eef3ff;color:#4e7af0}.tag-acc{background:#fff6f0;color:#e07b39}.tag-inv{background:#fff3e0;color:#e07b39}
.items-wrap{padding:2px 0}
.item-row{display:flex;align-items:center;padding:8px 18px;gap:10px;border-bottom:1px solid #f8f8f8}
.item-row:last-child{border-bottom:none}
.icode{font-size:12px;font-weight:700;color:#4e7af0;min-width:72px}
.iname{font-size:13px;color:#555;flex:1}
.icat{font-size:11px;color:#ccc;min-width:80px}
.iqty{font-size:14px;font-weight:800;color:#222;min-width:55px;text-align:right}
.iqty span{font-size:11px;color:#aaa;font-weight:400;margin-left:2px}
.order-rmk{padding:6px 18px 12px;font-size:12px;color:#bbb}
.order-rmk em{color:#888;font-style:normal}
.empty{text-align:center;padding:80px 20px;color:#ccc}
.empty .ico{font-size:48px;margin-bottom:12px}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 11px;border-radius:20px;cursor:pointer;border:none;white-space:nowrap;position:relative}
.status-todo{background:#fff8e6;color:#d97706;border:1.5px solid #fcd34d}
.status-todo:hover{background:#fef3c7}
.status-done{background:#f0faf4;color:#38a169;border:1.5px solid #86efac}
.status-done:hover{background:#dcfce7}
.status-lack{background:#fff0f0;color:#e53e3e;border:1.5px solid #fca5a5}
.status-lack:hover{background:#ffe4e4}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-todo{background:#d97706}.dot-done{background:#38a169}.dot-lack{background:#e53e3e}
.status-menu{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1.5px solid #e8e8e8;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:500;min-width:148px;display:none}
.status-menu.open{display:block}
.status-menu-item{padding:9px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f5f5f5}
.status-menu-item:last-child{border-bottom:none}
.status-menu-item:hover{background:#f5f8ff}
.status-menu-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cb-wrap{display:flex;align-items:center;padding-right:4px}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#4e7af0}
.loading{text-align:center;padding:60px;color:#bbb;font-size:14px}
/* 盘点汇总专属 */
.inv-card{background:#fff;border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden}
.inv-card-hd{padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#fffaf5;border-bottom:1px solid #f5e8d8;cursor:pointer}
.inv-card-hd:hover{background:#fff3e8}
.inv-sup-name{font-size:14px;font-weight:700;color:#222;flex:1}
.inv-time{font-size:12px;color:#ccc}
.inv-buyer{font-size:12px;color:#888;background:#f0f0f0;padding:2px 8px;border-radius:12px}
.inv-skc-count{font-size:12px;color:#e07b39;font-weight:600;background:#fff3e0;padding:2px 8px;border-radius:10px;border:1px solid #fcd34d}
.inv-toggle{font-size:12px;color:#bbb;padding:2px 8px}
.inv-body{display:none;padding:12px 0}
.inv-body.open{display:block}
/* 盘点明细表 */
.inv-detail-table{width:100%;border-collapse:collapse;font-size:12px}
.inv-detail-table th{background:#fff8f4;color:#999;font-weight:500;padding:7px 10px;text-align:center;border-bottom:1.5px solid #f5e0d0;white-space:nowrap}
.inv-detail-table td{padding:6px 10px;border-bottom:1px solid #f8f8f8;text-align:center;vertical-align:middle}
.inv-detail-table tr:last-child td{border-bottom:none}
.inv-detail-table .td-left{text-align:left}
.skc-cell{font-size:13px;font-weight:700;color:#333}
.node-val{font-size:13px;font-weight:600;color:#2e7d32}
.node-val.zero{color:#ccc}
.node-surplus{font-size:12px;font-weight:600}
.surplus-pos{color:#38a169}
.surplus-neg{color:#e53e3e;font-weight:700}
.schedule-cell{font-size:12px;color:#555}
.schedule-cell.no-plan{color:#e53e3e}
.inv-remark-row{padding:6px 18px 10px;font-size:12px;color:#bbb;border-top:1px dashed #f0e0d0}
.inv-remark-row em{color:#888;font-style:normal}
/* 结论标签 */
.conclusion{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.c-ok{background:#f0faf4;color:#38a169;border:1px solid #b2dfb2}
.c-risk{background:#fff8e6;color:#d97706;border:1px solid #fcd34d}
.c-danger{background:#fff0f0;color:#e53e3e;border:1px solid #fca5a5}
.c-unknown{background:#f5f5f5;color:#aaa;border:1px solid #e0e0e0}
@media(max-width:700px){
  .stats-7{grid-template-columns:repeat(4,1fr)}
  .stats-5{grid-template-columns:repeat(3,1fr)}
  .module{padding:16px 8px 60px}
  .tab-btn{padding:14px 14px;font-size:13px}
  .top-logo{display:none}
  .inv-detail-table{display:block;overflow-x:auto}
}
</style>
</head>
<body>
<div class="top-nav">
  <div class="top-nav-inner">
    <div class="top-logo">供应商协作平台 · 内部管理</div>
    <button class="tab-btn active" id="tabMat" onclick="switchTab('mat')">物料申请汇总</button>
  </div>
</div>

<!-- ════════════ 模块2：物料申请汇总 ════════════ -->
<div class="module show" id="modMat">
  <div class="page-hd">
    <div>
      <h1>物料申请汇总</h1>
      <div class="sub" id="lastRefresh">采购查看端 · 多设备实时同步</div>
    </div>
  </div>

  <div class="stats stats-7">
    <div class="sc"><div class="n n-gray" id="sTotal">—</div><div class="l">总申请单</div></div>
    <div class="sc"><div class="n n-blue" id="sReg">—</div><div class="l">常规女装</div></div>
    <div class="sc"><div class="n n-orange" id="sAcc">—</div><div class="l">ACC</div></div>
    <div class="sc"><div class="n n-green" id="sItems">—</div><div class="l">合计物料行</div></div>
    <div class="sc"><div class="n" style="color:#d97706" id="sTodo">—</div><div class="l">待办</div></div>
    <div class="sc"><div class="n n-red" id="sLack">—</div><div class="l">物料不足</div></div>
    <div class="sc"><div class="n n-green" id="sDone">—</div><div class="l">已办</div></div>
  </div>

  <div class="toolbar">
    <div class="toolbar-row">
      <label>品类</label>
      <select id="fType" onchange="load()">
        <option value="">全部</option>
        <option value="常规女装">常规女装</option>
        <option value="ACC">ACC</option>
      </select>
      <label style="margin-left:8px">采购员</label>
      <select id="fBuyer" onchange="load()">
        <option value="">全部采购员</option>
      </select>
      <label style="margin-left:8px">供应商</label>
      <input type="text" id="fSup" placeholder="输入关键字…" style="min-width:160px" oninput="debounce()"/>
      <label style="margin-left:8px">处理状态</label>
      <select id="fStatus" onchange="load()">
        <option value="">全部状态</option>
        <option value="待办">待办</option>
        <option value="物料不足待办">物料不足待办</option>
        <option value="已办">已办</option>
      </select>
      <div class="btn-group">
        <button class="btn btn-reset" onclick="resetFilters()">重置筛选</button>
        <button class="btn btn-refresh" onclick="load()">刷新</button>
        <button class="btn btn-export" id="exportBtn" onclick="exportCSV()">导出选中</button>
        <button class="btn btn-clear" onclick="clearAll()">清空数据</button>
      </div>
    </div>
    <div class="toolbar-row">
      <label>提交时间</label>
      <input type="date" id="fDateFrom" onchange="load()"/>
      <span class="date-sep">至</span>
      <input type="date" id="fDateTo" onchange="load()"/>
    </div>
  </div>

  <div class="sel-bar" id="selBar">
    已选 <b id="selCount">0</b> 条&nbsp;·&nbsp;
    <span style="cursor:pointer;text-decoration:underline" onclick="selectAll()">全选当前页</span>
    &nbsp;/&nbsp;
    <span style="cursor:pointer;text-decoration:underline" onclick="clearSel()">取消全选</span>
    &nbsp;&nbsp;
    <button class="btn" style="height:30px;padding:0 14px;font-size:12px;background:#38a169;color:#fff;border-radius:8px" onclick="batchSetStatus('已办')">批量已办</button>
    <button class="btn" style="height:30px;padding:0 14px;font-size:12px;background:#fff8e6;color:#d97706;border:1.5px solid #fcd34d;border-radius:8px" onclick="batchSetStatus('待办')">批量待办</button>
  </div>

  <div id="list"><div class="loading">加载中…</div></div>
</div>

<div class="status-menu" id="statusMenu">
  <div class="status-menu-item" onclick="setStatus('待办')"><span class="dot" style="background:#d97706"></span>待办</div>
  <div class="status-menu-item" onclick="setStatus('物料不足待办')"><span class="dot" style="background:#e53e3e"></span>物料不足待办</div>
  <div class="status-menu-item" onclick="setStatus('已办')"><span class="dot" style="background:#38a169"></span>已办</div>
</div>

<script>
const SUPA_URL = 'https://hbsmqaqhkgqzqgsnjjws.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhic21xYXFoa2dxenFnc25qandzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMjk0MzAsImV4cCI6MjA5MDYwNTQzMH0.F5KKboImQPpjpTMJ21viUvo9GvX09WfyalFFjpjsOMI';
const SUPA_HDR = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY };
const ALL_BUYERS = ["温裕宁 Wynn Wen","王云迪 Ivan Wang","苏灏洋 Sergi Su","茹静宜 Jeany Ru","许晓斌 Mika Xu","赵萍君 Risa Zhao","钟碧莹 Biying Zhong","黄洁英 Yellow Huang","黄金凤 Olivia Huang"];
const INV_NODES = [
  {label:'5月3日前',key:'n1'},{label:'5月5日前',key:'n2'},{label:'5月9日前',key:'n3'},
  {label:'5月13日前',key:'n4'},{label:'5月14日前',key:'n5'},{label:'5月18日前',key:'n6'},{label:'5月21日前',key:'n7'}
];

// ══ Tab 切换 ══
function switchTab(tab) {
  document.getElementById('modMat').classList.toggle('show', tab === 'mat');
  document.getElementById('tabMat').classList.toggle('active', tab === 'mat');
}

// 初始化采购员下拉
ALL_BUYERS.forEach(b => {
  ['fBuyer'].forEach(selId => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    document.getElementById(selId).appendChild(opt);
  });
});

// ══════════════════════════════════════════
//  盘点汇总模块
// ══════════════════════════════════════════
let invAllData = [];
let invDebTimer = null;

function invDebounce(){ clearTimeout(invDebTimer); invDebTimer = setTimeout(loadInv, 350); }

function resetInvFilters(){
  document.getElementById('invFSup').value = '';
  document.getElementById('invFBuyer').value = '';
  document.getElementById('invFDateFrom').value = '';
  document.getElementById('invFDateTo').value = '';
  loadInv();
}

async function loadInv() {
  const supF = document.getElementById('invFSup').value.trim();
  const buyerF = document.getElementById('invFBuyer').value;
  const dateFrom = document.getElementById('invFDateFrom').value;
  const dateTo = document.getElementById('invFDateTo').value;

  const params = new URLSearchParams({ select: '*', order: 'submit_time.desc', 'type': 'eq.盘点' });
  if (buyerF) params.set('buyer', 'eq.' + buyerF);
  if (supF) params.set('supplier', 'ilike.*' + supF + '*');

  document.getElementById('invList').innerHTML = '<div class="loading">加载中…</div>';
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/orders?' + params.toString(), {
      headers: { ...SUPA_HDR, 'Range': '0-9999' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    let data = await res.json();
    data = data.map(o => ({
      ...o,
      items: typeof o.items === 'string' ? JSON.parse(o.items) : (o.items || [])
    }));
    // 日期过滤
    if (dateFrom || dateTo) {
      data = data.filter(o => {
        const d = o.submit_time ? o.submit_time.split(' ')[0].replace(/\//g,'-') : '';
        if (dateFrom && d < dateFrom) return false;
        if (dateTo && d > dateTo) return false;
        return true;
      });
    }
    invAllData = data;

    // 统计
    const allSkcs = data.reduce((s,o) => s + (o.items||[]).length, 0);
    const sups = new Set(data.map(o => o.supplier)).size;
    let shortageCount = 0;
    let noPlanCount = 0;
    data.forEach(o => {
      (o.items||[]).forEach(item => {
        const total = parseInt(item.order_total) || 0;
        const sumNodes = INV_NODES.reduce((s,n) => s + (parseInt(item[n.key])||0), 0);
        const stockQty = parseInt(item.stock_qty) || 0;
        const totalCan = stockQty + sumNodes;
        if (total > 0 && totalCan < total) shortageCount++;
        if ((item.schedule||'').trim() === '#') noPlanCount++;
      });
    });

    document.getElementById('invTotal').textContent = data.length;
    document.getElementById('invSkcs').textContent = allSkcs;
    document.getElementById('invSups').textContent = sups;
    document.getElementById('invShortage').textContent = shortageCount;
    document.getElementById('invNoPlan').textContent = noPlanCount;
    document.getElementById('invLastRefresh').textContent = '最后刷新：' + new Date().toLocaleTimeString('zh-CN');

    renderInvList(data);
  } catch(e) {
    document.getElementById('invList').innerHTML = '<div class="empty"><div class="ico" style="font-size:40px;color:#ddd">&#9888;</div><p>加载失败：' + e.message + '</p></div>';
  }
}

function calcNodeSurplus(items, nodeIdx) {
  // 累计到该节点的可发量 vs 该节点的下单分布
  // 简化：用累计可发量（现货+各节点累加）对比下单总数
  return null; // 复杂计算留给导出时处理
}

function getConclusion(item) {
  const total = parseInt(item.order_total) || 0;
  if (total === 0) return '<span class="conclusion c-unknown">未填总数</span>';
  const stockQty = parseInt(item.stock_qty) || 0;
  const sumNodes = INV_NODES.reduce((s,n) => s + (parseInt(item[n.key])||0), 0);
  const totalCan = stockQty + sumNodes;
  const ratio = totalCan / total;
  if (ratio >= 1) return '<span class="conclusion c-ok">可满足</span>';
  if (ratio >= 0.7) return '<span class="conclusion c-risk">部分缺货</span>';
  return '<span class="conclusion c-danger">严重缺货</span>';
}

function getSurplusAtLastNode(item) {
  const total = parseInt(item.order_total) || 0;
  if (total === 0) return null;
  const stockQty = parseInt(item.stock_qty) || 0;
  const sumNodes = INV_NODES.reduce((s,n) => s + (parseInt(item[n.key])||0), 0);
  return stockQty + sumNodes - total;
}

function renderInvList(list) {
  const el = document.getElementById('invList');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="ico" style="font-size:40px;color:#ddd">&#9744;</div><p>暂无盘点记录（当前筛选条件下）</p></div>';
    return;
  }
  el.innerHTML = list.map((o, oi) => {
    const items = o.items || [];
    const tableRows = items.map((item, ii) => {
      const skc = item.skc || '—';
      const isku = item.inventory_sku || '—';
      const ssku = item.supplier_sku || '—';
      const spec = item.spec || '—';
      const total = parseInt(item.order_total) || 0;
      const stockQty = parseInt(item.stock_qty) || 0;

      let cumulative = stockQty;
      const nodeCells = INV_NODES.map(n => {
        const v = parseInt(item[n.key]) || 0;
        cumulative += v;
        const surplus = total > 0 ? cumulative - total : null;
        const surplusHtml = surplus !== null
          ? '<br><span class="' + (surplus >= 0 ? 'surplus-pos' : 'surplus-neg') + '">' + (surplus >= 0 ? '+' : '') + surplus + '</span>'
          : '';
        return '<td><span class="node-val' + (v === 0 ? ' zero' : '') + '">' + v + '</span>' + surplusHtml + '</td>';
      }).join('');

      const finalSurplus = getSurplusAtLastNode(item);
      const scheduleClass = (item.schedule||'').trim() === '#' ? ' no-plan' : '';

      return '<tr>' +
        '<td class="td-left skc-cell">' + skc + '</td>' +
        '<td class="td-left" style="font-size:11px;color:#888">' + isku + '</td>' +
        '<td class="td-left" style="font-size:11px;color:#bbb">' + ssku + '</td>' +
        '<td style="font-size:11px;color:#bbb">' + spec + '</td>' +
        '<td style="font-size:13px;font-weight:600;color:#333">' + (total||'—') + '</td>' +
        '<td style="font-size:13px;font-weight:600;color:#4e7af0">' + stockQty + '</td>' +
        nodeCells +
        '<td style="font-size:13px;font-weight:700;color:' + (finalSurplus===null?'#bbb':finalSurplus>=0?'#38a169':'#e53e3e') + '">' +
          (finalSurplus === null ? '—' : (finalSurplus >= 0 ? '+' : '') + finalSurplus) + '</td>' +
        '<td>' + getConclusion(item) + '</td>' +
        '<td class="schedule-cell' + scheduleClass + '">' + (item.schedule||'—') + '</td>' +
        '<td style="font-size:11px;color:#bbb">' + (item.no_reason||'—') + '</td>' +
        '<td style="font-size:11px;color:#bbb;max-width:120px;word-break:break-all">' + (item.remark||'—') + '</td>' +
        '</tr>';
    }).join('');

    const nodeHeaders = INV_NODES.map(n =>
      '<th>' + n.label + '<br><span style="font-size:10px;color:#ccc">新增可发/结余</span></th>'
    ).join('');

    const rmk = o.remark ? '<div class="inv-remark-row">整体备注：<em>' + o.remark + '</em></div>' : '';
    const totalSkcs = items.length;
    const shortSkcs = items.filter(it => {
      const t = parseInt(it.order_total)||0;
      if (!t) return false;
      const s = parseInt(it.stock_qty)||0;
      const sum = INV_NODES.reduce((acc,n) => acc+(parseInt(it[n.key])||0), 0);
      return s+sum < t;
    }).length;

    return '<div class="inv-card">' +
      '<div class="inv-card-hd" onclick="toggleInvCard(' + oi + ')">' +
      '<span class="tag tag-inv">盘点</span>' +
      '<span class="inv-sup-name">' + o.supplier + '</span>' +
      (o.buyer ? '<span class="inv-buyer">' + o.buyer + '</span>' : '') +
      '<span class="inv-skc-count">' + totalSkcs + ' 个 SKC' + (shortSkcs>0?'，缺货 '+shortSkcs+'个':'') + '</span>' +
      '<span class="inv-time">' + (o.submit_time||'') + '</span>' +
      '<span class="inv-toggle" id="invToggle_' + oi + '">展开 ▾</span>' +
      '</div>' +
      '<div class="inv-body" id="invBody_' + oi + '">' +
      '<div style="overflow-x:auto">' +
      '<table class="inv-detail-table">' +
      '<thead><tr>' +
      '<th class="td-left">SKC</th><th class="td-left">库存SKU</th><th class="td-left">供方货号</th><th>规格</th>' +
      '<th>下单总数</th><th>现货量</th>' +
      nodeHeaders +
      '<th>最终结余</th><th>结论</th><th>最早排单</th><th>无法排产原因</th><th>备注</th>' +
      '</tr></thead>' +
      '<tbody>' + tableRows + '</tbody>' +
      '</table></div>' +
      rmk +
      '</div>' +
      '</div>';
  }).join('');
}

function toggleInvCard(idx) {
  const body = document.getElementById('invBody_' + idx);
  const toggle = document.getElementById('invToggle_' + idx);
  const isOpen = body.classList.toggle('open');
  toggle.textContent = isOpen ? '收起 ▴' : '展开 ▾';
}

function exportInvExcel() {
  if (!invAllData.length) { alert('暂无盘点数据可导出'); return; }
  if (typeof XLSX === 'undefined') { alert('导出组件加载中，请稍后再试'); return; }

  const rows = [];
  const nodeLabels = INV_NODES.map(n => n.label + '新增可发');

  invAllData.forEach(o => {
    (o.items||[]).forEach(item => {
      const total = parseInt(item.order_total)||0;
      const stockQty = parseInt(item.stock_qty)||0;
      let cumulative = stockQty;
      const nodeVals = {};
      const nodeSurplus = {};
      INV_NODES.forEach(n => {
        const v = parseInt(item[n.key])||0;
        cumulative += v;
        nodeVals[n.label+'新增可发'] = v;
        nodeSurplus[n.label+'结余'] = total > 0 ? cumulative - total : '';
      });
      const finalSurplus = total > 0 ? stockQty + INV_NODES.reduce((s,n)=>s+(parseInt(item[n.key])||0),0) - total : '';
      rows.push({
        '供应商': o.supplier,
        '采购员': o.buyer||'',
        'SKC': item.skc||'',
        '库存SKU': item.inventory_sku||'',
        '供方货号': item.supplier_sku||'',
        '供方规格': item.spec||'',
        '下单总数': total||'',
        '现货数量': stockQty,
        ...nodeVals,
        ...nodeSurplus,
        '最终结余': finalSurplus,
        '最早排单时间': item.schedule||'',
        '无法生产原因': item.no_reason||'',
        '备注': item.remark||'',
        '整体备注': o.remark||'',
        '提交时间': o.submit_time||''
      });
    });
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '盘点汇总');
  const dateStr = new Date().toLocaleDateString('zh-CN').replace(/\//g,'-');
  XLSX.writeFile(wb, 'inventory-check-' + dateStr + '.xlsx');
}

async function clearInvAll() {
  if (!confirm('确定清空所有盘点记录？不可撤销！')) return;
  try {
    const res = await fetch(
      SUPA_URL + '/rest/v1/orders?id=not.is.null&type=eq.盘点',
      { method: 'DELETE', headers: { ...SUPA_HDR, 'Prefer': 'return=minimal' } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    alert('清空完成');
    loadInv();
  } catch(e) { alert('操作失败：' + e.message); }
}

// ══════════════════════════════════════════
//  物料申请汇总（原有逻辑完整保留）
// ══════════════════════════════════════════
let allData = [];
let fullData = [];
let selectedIds = new Set();
let debTimer = null;
let menuTargetId = null;

document.addEventListener('click', e => {
  const menu = document.getElementById('statusMenu');
  if (!menu.contains(e.target) && !e.target.closest('.status-badge')) {
    menu.classList.remove('open');
    menuTargetId = null;
  }
});

function debounce(){ clearTimeout(debTimer); debTimer = setTimeout(load, 350); }

function resetFilters(){
  ['fType','fBuyer','fSup','fStatus'].forEach(id => { const el=document.getElementById(id); if(el)el.value=''; });
  document.getElementById('fDateFrom').value = '';
  document.getElementById('fDateTo').value = '';
  load();
}

function openStatusMenu(orderId, badgeEl) {
  menuTargetId = orderId;
  const menu = document.getElementById('statusMenu');
  const rect = badgeEl.getBoundingClientRect();
  menu.style.left = rect.left + window.scrollX + 'px';
  menu.style.top = rect.bottom + window.scrollY + 4 + 'px';
  menu.style.position = 'absolute';
  document.body.appendChild(menu);
  menu.classList.add('open');
}

async function setStatus(newStatus) {
  const menu = document.getElementById('statusMenu');
  menu.classList.remove('open');
  if (!menuTargetId) return;
  try {
    const res = await fetch(
      SUPA_URL + '/rest/v1/orders?id=eq.' + encodeURIComponent(menuTargetId),
      { method:'PATCH', headers:{...SUPA_HDR,'Content-Type':'application/json','Prefer':'return=minimal'}, body:JSON.stringify({status:newStatus}) }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    load();
  } catch(e) { alert('状态更新失败：' + e.message); }
  menuTargetId = null;
}

async function batchSetStatus(newStatus) {
  if (selectedIds.size === 0) { alert('请先勾选要操作的申请单'); return; }
  const ids = [...selectedIds];
  if (!confirm('确定将选中的 ' + ids.length + ' 条申请标记为"' + newStatus + '"？')) return;
  let failCount = 0;
  for (const id of ids) {
    try {
      const res = await fetch(
        SUPA_URL + '/rest/v1/orders?id=eq.' + encodeURIComponent(id),
        { method:'PATCH', headers:{...SUPA_HDR,'Content-Type':'application/json','Prefer':'return=minimal'}, body:JSON.stringify({status:newStatus}) }
      );
      if (!res.ok) failCount++;
    } catch(e) { failCount++; }
  }
  if (failCount > 0) alert('操作完成，' + (ids.length-failCount) + ' 条成功，' + failCount + ' 条失败');
  load();
}

function onCheck(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
  refreshSelBar();
}
function selectAll() { allData.forEach(o => selectedIds.add(o.id)); document.querySelectorAll('.order-cb').forEach(cb => cb.checked=true); refreshSelBar(); }
function clearSel() { selectedIds.clear(); document.querySelectorAll('.order-cb').forEach(cb => cb.checked=false); refreshSelBar(); }
function refreshSelBar() {
  const bar=document.getElementById('selBar'), count=document.getElementById('selCount'), btn=document.getElementById('exportBtn');
  count.textContent=selectedIds.size;
  bar.classList.toggle('show', selectedIds.size>0);
  btn.disabled=selectedIds.size===0;
  btn.textContent=selectedIds.size>0?'导出选中（'+selectedIds.size+'）':'导出选中';
}

async function load(){
  const typeF=document.getElementById('fType').value;
  const buyerF=document.getElementById('fBuyer').value;
  const supF=document.getElementById('fSup').value.trim();
  const dateFrom=document.getElementById('fDateFrom').value;
  const dateTo=document.getElementById('fDateTo').value;
  const statusF=document.getElementById('fStatus').value;

  const filtParams=new URLSearchParams({select:'*',order:'submit_time.desc'});
  // 只查物料申请类型（排除盘点）
  filtParams.set('type', 'neq.盘点');
  if (typeF) filtParams.set('type','eq.'+typeF);
  if (buyerF) filtParams.set('buyer','eq.'+buyerF);
  if (supF) filtParams.set('supplier','ilike.*'+supF+'*');
  if (statusF) filtParams.set('status','eq.'+statusF);
  if (dateFrom) filtParams.set('submit_time','gte.'+dateFrom);

  const allParams=new URLSearchParams({select:'*',order:'submit_time.desc'});
  allParams.set('type','neq.盘点');

  document.getElementById('list').innerHTML='<div class="loading">加载中…</div>';
  try {
    const commonHdrs={...SUPA_HDR,'Range':'0-9999'};
    const [filtRes,allRes]=await Promise.all([
      fetch(SUPA_URL+'/rest/v1/orders?'+filtParams.toString(),{headers:commonHdrs}),
      fetch(SUPA_URL+'/rest/v1/orders?'+allParams.toString(),{headers:commonHdrs})
    ]);
    if (!filtRes.ok) throw new Error('HTTP '+filtRes.status);
    if (!allRes.ok) throw new Error('HTTP '+allRes.status);

    const parseItems=arr=>arr.map(o=>({...o,items:typeof o.items==='string'?JSON.parse(o.items):(o.items||[])}));
    let filtData=parseItems(await filtRes.json());
    let allData_=parseItems(await allRes.json());

    if (dateFrom||dateTo) {
      filtData=filtData.filter(o=>{
        const d=o.submit_time?o.submit_time.split(' ')[0].replace(/\//g,'-'):'';
        if (dateFrom&&d<dateFrom) return false;
        if (dateTo&&d>dateTo) return false;
        return true;
      });
    }

    allData=filtData; fullData=allData_;
    document.getElementById('sTotal').textContent=fullData.length;
    document.getElementById('sReg').textContent=fullData.filter(o=>o.type==='常规女装').length;
    document.getElementById('sAcc').textContent=fullData.filter(o=>o.type==='ACC').length;
    document.getElementById('sItems').textContent=fullData.reduce((s,o)=>s+(o.items||[]).length,0);
    document.getElementById('sTodo').textContent=fullData.filter(o=>(o.status||'待办')==='待办').length;
    document.getElementById('sLack').textContent=fullData.filter(o=>o.status==='物料不足待办').length;
    document.getElementById('sDone').textContent=fullData.filter(o=>o.status==='已办').length;
    document.getElementById('lastRefresh').textContent='最后刷新：'+new Date().toLocaleTimeString('zh-CN');

    const supLastDate={};
    fullData.forEach(o=>{
      const sup=o.supplier; const date=o.submit_time?o.submit_time.split(' ')[0].replace(/\//g,'-'):null;
      if (!date) return;
      if (!supLastDate[sup]||date>supLastDate[sup]) supLastDate[sup]=date;
    });

    selectedIds.clear(); refreshSelBar();
    renderList(allData, supLastDate);
  } catch(e) {
    document.getElementById('list').innerHTML='<div class="empty"><div class="ico" style="font-size:40px;color:#ddd">&#9888;</div><p>加载失败：'+e.message+'</p></div>';
  }
}

function daysDiff(dateStr) {
  if (!dateStr) return null;
  const d=new Date(dateStr); if(isNaN(d)) return null;
  const today=new Date(); today.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.round((today-d)/86400000);
}
function daysBadge(days) {
  if (days===null) return '<span class="days-badge days-new">首次申请</span>';
  if (days===0) return '<span class="days-badge days-fresh">今日申请</span>';
  if (days<=7) return '<span class="days-badge days-fresh">距上次'+days+'天</span>';
  if (days<=30) return '<span class="days-badge days-normal">距上次'+days+'天</span>';
  return '<span class="days-badge days-warn">距上次'+days+'天</span>';
}
function statusBadgeHtml(o) {
  const st=o.status||'待办';
  let cls='status-todo',dotCls='dot-todo';
  if (st==='已办'){cls='status-done';dotCls='dot-done';}
  if (st==='物料不足待办'){cls='status-lack';dotCls='dot-lack';}
  return '<button class="status-badge '+cls+'" onclick="openStatusMenu(\''+o.id+'\',this)" title="点击切换状态"><span class="status-dot '+dotCls+'"></span>'+st+' &#9662;</button>';
}

function renderList(list, supLastDate) {
  const el=document.getElementById('list');
  if (!list.length){el.innerHTML='<div class="empty"><div class="ico" style="font-size:40px;color:#ddd">&#9741;</div><p>暂无申请记录（当前筛选条件下）</p></div>';return;}
  const supAllDates={};
  fullData.forEach(o=>{
    const sup=o.supplier; const date=o.submit_time?o.submit_time.split(' ')[0].replace(/\//g,'-'):null;
    if (!date) return;
    if (!supAllDates[sup]) supAllDates[sup]=[];
    supAllDates[sup].push(date);
  });
  Object.keys(supAllDates).forEach(s=>supAllDates[s].sort((a,b)=>b.localeCompare(a)));

  el.innerHTML=list.map(o=>{
    const isAcc=o.type==='ACC';
    const checked=selectedIds.has(o.id)?'checked':'';
    const dates=supAllDates[o.supplier]||[];
    const thisDate=o.submit_time?o.submit_time.split(' ')[0].replace(/\//g,'-'):null;
    let prevDate=null;
    if (thisDate){for(const d of dates){if(d<thisDate){prevDate=d;break;}}}
    let days;
    if (!prevDate){days=null;}
    else{const t=new Date(thisDate),p=new Date(prevDate);t.setHours(0,0,0,0);p.setHours(0,0,0,0);days=Math.round((t-p)/86400000);}
    const itemsHtml=(o.items||[]).map(it=>
      '<div class="item-row">' +
      '<span class="icode'+(isAcc?' acc':'')+'">'+it.code+'</span>' +
      '<span class="iname">'+(it.name||'')+'</span>' +
      '<span class="icat">'+(it.category||'')+'</span>' +
      '<span class="iqty">'+it.qty+'<span>件</span></span>' +
      '</div>'
    ).join('');
    const rmk=o.remark?'<div class="order-rmk">备注：<em>'+o.remark+'</em></div>':'';
    const buyerBadge=o.buyer?'<span class="obuyer">'+o.buyer+'</span>':'';
    return '<div class="order-card">' +
      '<div class="order-hd">' +
      '<div class="cb-wrap"><input type="checkbox" class="order-cb" '+checked+' onchange="onCheck(\''+o.id+'\',this.checked)"></div>' +
      '<span class="tag '+(isAcc?'tag-acc':'tag-reg')+'">'+o.type+'</span>' +
      '<span class="osup">'+o.supplier+'</span>' +
      buyerBadge + daysBadge(days) + statusBadgeHtml(o) +
      '<span class="oid">'+o.id+'</span>' +
      '<span class="otime">'+(o.submit_time||'')+'</span>' +
      '</div><div class="items-wrap">'+itemsHtml+'</div>'+rmk+'</div>';
  }).join('');
}

function exportCSV() {
  if (selectedIds.size===0){alert('请先勾选要导出的申请单');return;}
  const selected=allData.filter(o=>[...selectedIds].includes(o.id));
  const rows=[];
  selected.forEach(o=>{
    (o.items||[]).forEach(it=>{
      rows.push({'仓库代码':'ZQ1','领用类型':'采购领用','物料代码':it.code||'','货位':'ZQ1-WL01-0101','数量':it.qty||0,'供应商名称':o.supplier||''});
    });
  });
  if (typeof XLSX==='undefined'){alert('正在加载导出组件，请稍后再试');return;}
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'物料申请');
  const dateStr=new Date().toLocaleDateString('zh-CN').replace(/\//g,'-');
  XLSX.writeFile(wb,'material-apply-'+dateStr+'.xlsx');
}

async function clearAll() {
  if (!confirm('确定清空所有物料申请记录？不可撤销！')) return;
  try {
    const res=await fetch(SUPA_URL+'/rest/v1/orders?id=not.is.null&type=neq.盘点',
      {method:'DELETE',headers:{...SUPA_HDR,'Prefer':'return=minimal'}});
    if (!res.ok) throw new Error('HTTP '+res.status);
    alert('清空完成'); load();
  } catch(e){alert('操作失败：'+e.message);}
}

load();
setInterval(load, 30000);
